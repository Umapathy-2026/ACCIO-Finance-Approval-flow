{% extends "base.html" %}
{% block title %}Reset Password - ACCIO{% endblock %}
{% set hide_sidebar = True %}
{% block full_content %}
<div style="display:flex;min-height:100vh;font-family:var(--font);">
    <div style="flex:1;background-size:cover;background-position:center;background-repeat:no-repeat;background-image:url('{{ url_for('static', filename='logo.png') }}');display:flex;align-items:center;justify-content:center;position:relative;">
        <div style="position:absolute;inset:0;background:rgba(1,105,111,0.25);"></div>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;background:white;padding:48px;">
        <div style="width:100%;max-width:400px;">
            <div style="margin-bottom:32px;text-align:center;">
                <h1 style="font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px;">Set new password</h1>
                <p style="font-size:14px;color:var(--text-muted);">Must be at least 8 characters with 1 uppercase and 1 number</p>
            </div>
            <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div style="margin-bottom:20px;">
                    <label class="form-label" for="password">New Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Min 8 characters" required minlength="8" oninput="validatePassword(this.value)">
                    <div id="password-errors" style="font-size:12px;color:#dc2626;margin-top:4px;"></div>
                </div>
                <div style="margin-bottom:24px;">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Re-enter password" required oninput="validateMatch()">
                    <div id="confirm-errors" style="font-size:12px;color:#dc2626;margin-top:4px;"></div>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:11px 20px;">Reset Password</button>
            </form>
            <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:20px;">
                <a href="{{ url_for('auth.login') }}" style="color:var(--primary);text-decoration:none;">Back to Sign In</a>
            </p>
        </div>
    </div>
</div>
<script>
function validatePassword(pw) {
    var errors = [];
    if (pw.length < 8) errors.push('At least 8 characters');
    if (!/[A-Z]/.test(pw)) errors.push('At least one uppercase letter');
    if (!/[0-9]/.test(pw)) errors.push('At least one number');
    document.getElementById('password-errors').textContent = errors.join(', ');
}
function validateMatch() {
    var pw = document.getElementById('password').value;
    var cp = document.getElementById('confirm_password').value;
    document.getElementById('confirm-errors').textContent = (pw !== cp && cp.length > 0) ? 'Passwords do not match' : '';
}
</script>
{% endblock %}
