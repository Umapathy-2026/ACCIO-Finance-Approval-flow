{% extends "base.html" %}
{% block title %}Sign In - ACCIO{% endblock %}
{% set hide_sidebar = True %}
{% block full_content %}
<div style="display:flex;min-height:100vh;font-family:var(--font);">
    <div style="flex:1;background-size:cover;background-position:center;background-repeat:no-repeat;background-image:url('{{ url_for('static', filename='logo.png') }}');display:flex;align-items:center;justify-content:center;position:relative;">
        <div style="position:absolute;inset:0;background:rgba(1,105,111,0.25);"></div>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;background:white;padding:48px;">
        <div style="width:100%;max-width:400px;">
            <div style="margin-bottom:32px;text-align:center;">
                <h1 style="font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px;">Welcome back</h1>
                <p style="font-size:14px;color:var(--text-muted);">Sign in to your account to continue</p>
            </div>
            <form method="POST" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div style="margin-bottom:20px;">
                    <label class="form-label" for="email">Email address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@company.com" required autofocus>
                </div>
                <div style="margin-bottom:24px;">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:11px 20px;">Sign In</button>
            </form>
            <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:16px;">
                <a href="{{ url_for('auth.forgot_password') }}" style="color:var(--primary);text-decoration:none;">Forgot your password?</a>
            </p>
            <p style="text-align:center;font-size:12px;color:var(--text-faint);margin-top:16px;">Local development environment</p>
        </div>
    </div>
</div>
<script>document.addEventListener('DOMContentLoaded',function(){lucide.createIcons();});</script>
{% endblock %}
